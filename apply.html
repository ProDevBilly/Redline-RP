<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP | Apply</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;

            /* Softer animated gradient background */
            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* GLASS PANEL */
        .glass-panel {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            padding: 40px 20px;

            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);

            animation: fadeIn 1.2s ease forwards;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TITLE */
        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            font-weight: 900;

            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;

            animation: bgShift 6s linear infinite;
        }

        p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.35);
            margin-bottom: 30px;
        }

        /* RESPONSIVE IFRAME */
        .form-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        iframe {
            width: 100%;
            max-width: 900px;
            height: 900px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 600px) {
            h1 { font-size: 30px; }
            p { font-size: 15px; }
            iframe { height: 1100px; }
        }
    </style>
</head>

    <!-- Background Music -->
<audio id="bg-music" loop>
    <source src="https://raw.githubusercontent.com/ProDevBilly/Redline-RP/main/Junnior%20-%20City2City%20(Official%20Video).mp3" type="audio/mpeg">
</audio>

<!-- Mute Button -->
<button id="mute-btn" onclick="toggleMute()">🔊</button>

<script>
    const music = document.getElementById("bg-music");
    const btn = document.getElementById("mute-btn");

    // Start music after first click anywhere (browser requirement)
    document.addEventListener("click", () => {
        if (music.paused) {
            music.play();
        }
    }, { once: true });

    function toggleMute() {
        if (music.muted) {
            music.muted = false;
            btn.textContent = "🔊";
        } else {
            music.muted = true;
            btn.textContent = "🔇";
        }
    }
</script>

<style>
    #mute-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 15px;
        font-size: 22px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        color: white;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        z-index: 9999;
    }

    #mute-btn:hover {
        transform: scale(1.1);
        background: rgba(255, 255, 255, 0.35);
    }
</style>
    
<body>

<div class="glass-panel">
    <h1>Apply to RedLine RP</h1>
    <p>The best roleplay server you’ll ever experience inside San Aurie.</p>

    <div class="form-container">
        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLScYhl_lUKsxTnMIzGH7KmmZYo0Cvm9ho8VwM4WOxSpF5zypOQ/viewform?embedded=true">
        </iframe>
    </div>
</div>

</body>
</html>
