<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP | Apply</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);
            animation: fadeIn 1.2s ease forwards;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            font-weight: 900;
            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 30px;
        }

        iframe {
            width: 100%;
            max-width: 900px;
            height: 900px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
        }

        #mute-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 0;
    margin: 0;
    font-size: 32px;
    color: white;
    cursor: pointer;
    z-index: 9999;

    /* FULLY TRANSPARENT BUTTON */
    background: transparent;
    background-color: transparent;
    border: none;
    border-radius: 0;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
}

#mute-btn:hover {
    transform: scale(1.15);
}
    </style>
</head>

<body>

<div class="glass-panel">
    <h1>Apply to RedLine RP</h1>
    <p>The best roleplay server you’ll ever experience inside San Aurie.</p>

    <a class="discord-btn" href="https://discord.gg/n77YbQMfTt" target="_blank" style="background:#5865F2;color:white;padding:12px 20px;border-radius:10px;font-weight:bold;text-decoration:none;display:inline-block;margin-bottom:20px;">
        Join Our Discord (Required)
    </a>

    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScYhl_lUKsxTnMIzGH7KmmZYo0Cvm9ho8VwM4WOxSpF5zypOQ/viewform?embedded=true"></iframe>
</div>

<audio id="bg-music" autoplay loop muted>
    <source src="https://raw.githubusercontent.com/ProDevBilly/RedLine-RP/main/Junnior%20-%20City2City%20(Official%20Video).mp3" type="audio/mpeg">
</audio>

<button id="mute-btn" onclick="toggleMute()">🔊</button>

<script>
    const music = document.getElementById("bg-music");
    const btn = document.getElementById("mute-btn");

    music.volume = 0;
    let targetVolume = 0.35;
    let fadeSpeed = 2;

    setTimeout(() => {
        music.muted = false;

        let fadeIn = setInterval(() => {
            if (music.volume < targetVolume) {
                music.volume += fadeSpeed;
            } else {
                clearInterval(fadeIn);
            }
        }, 100);

    }, 500);

    function toggleMute() {
        music.muted = !music.muted;
        btn.textContent = music.muted ? "🔇" : "🔊";
    }
</script>

</body>
</html>
