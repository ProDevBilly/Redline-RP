<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
        overflow-x: hidden;

        /* Animated gradient background */
        background: linear-gradient(120deg, #ff4d4d, #ff66cc, #3399ff);
        background-size: 300% 300%;
        animation: bgShift 12s ease infinite;
    }

    @keyframes bgShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* GLASS PANEL covering the whole content area */
    .glass-panel {
        width: 90%;
        max-width: 1100px;
        margin: 40px auto;
        padding: 40px 20px;

        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);

        animation: fadeIn 1.2s ease forwards;
    }

    /* Fade-in animation */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Floating animation */
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* HERO IMAGE */
    .hero-img {
        width: 60%;
        max-width: 380px;
        display: block;
        margin: 0 auto;
        border-radius: 15px;
        animation: float 4s ease-in-out infinite;
    }

    /* TITLE */
    h1 {
        text-align: center;
        font-size: 48px;
        margin-top: 25px;
        font-weight: 900;

        background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        color: transparent;

        animation: bgShift 6s linear infinite;
    }

    /* SUBTEXT */
    p {
        text-align: center;
        font-size: 20px;
        opacity: 0.9;
        margin-top: -10px;
    }

    /* BUTTON */
    .btn {
        display: block;
        width: fit-content;
        margin: 25px auto 0 auto;
        padding: 14px 28px;

        background: white;
        color: #ff4d4d;
        font-weight: bold;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;

        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    /* RESPONSIVE FIXES */
    @media (max-width: 600px) {
        h1 { font-size: 34px; }
        p { font-size: 16px; }
        .hero-img { width: 80%; }
        .glass-panel { padding: 25px 15px; }
    }
</style>

<!-- GLASS PANEL -->
<div class="glass-panel">
    <img class="hero-img" src="https://i.ibb.co/jPytNmjX/Copilot-20260330-210926.png" alt="RedLine RP Hero Image">

    <h1>Welcome to RedLine RP</h1>
    <p>The official roleplay community of San Aurie.</p>

    <a class="btn" href="apply.html">Join Our Roleplays</a>
</div>
