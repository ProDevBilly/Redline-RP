<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #000;
        overflow-x: hidden;
        background: linear-gradient(120deg, #ff4d4d, #ff66cc, #3399ff);
        background-size: 300% 300%;
        animation: bgShift 12s ease infinite;
    }

    /* Smooth looping gradient animation */
    @keyframes bgShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Floating animation */
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* Fade-in animation */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Hero Section */
    .hero {
        text-align: center;
        padding: 60px 20px;
        animation: fadeIn 1.2s ease forwards;
    }

    .hero img {
        width: 45%;
        max-width: 420px;
        border-radius: 15px;
        animation: float 4s ease-in-out infinite;
    }

    .hero h1 {
        font-size: 52px;
        margin-top: 20px;
        font-weight: 900;
        background: linear-gradient(90deg, #ffffff, #ffcccc, #ffffff);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        color: transparent;
        animation: bgShift 6s linear infinite;
    }

    .hero p {
        font-size: 20px;
        margin-top: -10px;
        opacity: 0.9;
        color: white;
    }

    .btn {
        display: inline-block;
        margin-top: 25px;

        color: #ff4d4d;
        font-weight: bold;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }
</style>
