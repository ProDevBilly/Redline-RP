<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP | Home</title>

    <!-- Favicon / Tab Icon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #000;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #fff;
            border-bottom: 4px solid;
            border-image: linear-gradient(90deg, #ff4d4d, #ff66cc, #3399ff) 1;
        }

        nav img {
            height: 55px;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            font-weight: bold;
            color: #000;
            font-size: 18px;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .hero img {
            width: 80%;
            max-width: 700px;
            border-radius: 15px;
        }

        .hero h1 {
            font-size: 48px;
            margin-top: 20px;
            background: linear-gradient(90deg, #ff4d4d, #ff66cc, #3399ff);
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 900;
        }

        .hero p {
            font-size: 20px;
            margin-top: -10px;
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background: linear-gradient(90deg, #ff4d4d, #ff66cc, #3399ff);
            color: white;
            font-weight: bold;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* About Section */
        .section {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .section h2 {
            font-size: 32px;
            background: linear-gradient(90deg, #ff4d4d, #ff66cc, #3399ff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<!-- Navigation -->
<nav>
    <img src="simple-logo.png" alt="RedLine RP Logo">
    <div>
        <a href="home.html">Home</a>
        <a href="apply.html">Apply</a>
        <a href="rules.html">Rules</a>
    </div>
</nav>

<!-- Hero Section -->
<div class="hero">
    <img src="https://i.ibb.co/jPytNmjX/Copilot-20260330-210926.png" alt="RedLine RP Hero Image">
    <h1>Welcome to RedLine RP</h1>
    <p>San Aurie’s #1 kid‑friendly coastal roleplay community.</p>
    <a class="btn" href="apply.html">Join Our Roleplays</a>
</div>
