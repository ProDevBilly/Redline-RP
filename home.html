<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
        overflow-x: hidden;

        /* Animated gradient background */
        background: linear-gradient(120deg, #ff4d4d, #ff66cc, #3399ff);
        background-size: 300% 300%;
        animation: bgShift 12s ease infinite;
    }

    @keyframes bgShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Frosted glass container */
    .glass-box {
        max-width: 900px;
        margin: 60px auto;
        padding: 40px 30px;
        border-radius: 20px;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);

        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);

        animation: fadeIn 1.2s ease forwards;
        text-align: center;
    }

    /* Fade-in animation */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Floating animation */
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* Hero image */
    .glass-box img {
        width: 45%;
        max-width: 420px;
        border-radius: 15px;
        animation: float 4s ease-in-out infinite;
    }

    /* Animated gradient text */
    .glass-box h1 {
        font-size: 52px;
        margin-top: 20px;
        font-weight: 900;

        background: linear-gradient(90deg, #ffffff, #ffcccc, #ffffff);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        color: transparent;

        animation: bgShift 6s linear infinite;
    }

    .glass-box p {
        font-size: 20px;
        margin-top: -10px;
        opacity: 0.9;
    }

    /* Button */
    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 14px 28px;
        background: white;
        color: #ff4d4d;
        font-weight: bold;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }
</style>

<!-- HERO SECTION (GLASS BOX) -->
<div class="glass-box">
    <img src="https://i.ibb.co/jPytNmjX/Copilot-20260330-210926.png" alt="RedLine RP Hero Image">
    <h1>Welcome to RedLine RP</h1>
    <p>San Aurie’s #1 kid‑friendly coastal roleplay community.</p>
    <a class="btn" href="apply.html">Join Our Roleplays</a>
</div>
