<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP | Home</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;

            display: flex;
            flex-direction: column;
            align-items: center;

            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* TOPBAR */
        .topbar {
            width: 100%;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            gap: 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
        }

        .topbar a {
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            animation: textGlow 3s ease-in-out infinite;
        }

        @keyframes textGlow {
            0% { color: #ffffff; }
            50% { color: #ffe6f2; }
            100% { color: #ffffff; }
        }

        /* HERO SECTION */
        .hero {
            margin-top: 160px;
            text-align: center;
            animation: fadeSlideUp 1.2s ease forwards;
            opacity: 0;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero img {
            width: 300px;
            border-radius: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 60px;
            margin-top: 20px;
            font-weight: 900;
            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        p {
            font-size: 22px;
            margin-top: -10px;
            color: rgba(255, 255, 255, 0.85);
        }

        /* BUTTONS */
        .btn-row {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: 0.2s;
        }

        .discord-btn {
            background: #5865F2;
            color: white;
        }

        .roblox-btn {
            background: #E2231A;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* MUSIC BUTTON */
        #mute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 15px;
            font-size: 22px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 18px rgba(0,0,0,0.25);
            z-index: 9999;
        }

        #mute-btn:hover {
            transform: scale(1.12);
            background: rgba(255, 255, 255, 0.25);
        }

        .footer {
            margin-top: 80px;
            margin-bottom: 20px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <a href="home.html">Home</a>
    <a href="apply.html">Apply</a>
    <a href="departments.html">Departments</a>
</div>

<!-- HERO SECTION -->
<div class="hero">
    <img src="https://i.ibb.co/PZy08gcC/Icon.png">
    <h1>RedLine Roleplay</h1>
    <p>The best roleplay server you’ll ever experience inside San Aurie.</p>

    <div class="btn-row">
        <a class="btn discord-btn" href="https://discord.gg/EgQfVurNMZ" target="_blank">
            Join Our Discord (Required)
        </a>

        <a class="btn roblox-btn" href="https://www.roblox.com/communities/668533941/RedLine-RP-Community#!/about" target="_blank">
            Join Our Roblox Group (Required)
        </a>
    </div>
</div>

<div class="footer">
    © 2026 RedLine RP — All Rights Reserved
</div>

<!-- AUTOPLAY MUSIC -->
<audio id="bg-music" autoplay loop muted>
    <source src="https://raw.githubusercontent.com/ProDevBilly/RedLine-RP/main/Junnior%20-%20City2City%20(Official%20Video).mp3" type="audio/mpeg">
</audio>

<button id="mute-btn">🔊</button>

<script>
    /* AUTOPLAY MUSIC SYSTEM */
    const music = document.getElementById("bg-music");
    const btn = document.getElementById("mute-btn");

    music.volume = 0;
    let targetVolume = 0.25;

    setTimeout(() => {
        music.muted = false;
        let fade = setInterval(() => {
            if (music.volume < targetVolume) {
                music.volume += 0.01;
            } else {
                clearInterval(fade);
            }
        }, 60);
    }, 800);

    btn.addEventListener("click", () => {
        if (music.muted || music.volume === 0) {
            music.muted = false;
            music.volume = targetVolume;
            btn.textContent = "🔊";
        } else {
            music.muted = true;
            btn.textContent = "🔇";
        }
    });
</script>

</body>
</html>
